apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: infra
  source:
    chart: nats
    repoURL: 'https://nats-io.github.io/k8s/helm/charts'
    targetRevision: 1.3.x
    helm:
      values: |
        config:
          cluster:
            enabled: false
          jetstream:
            enabled: true
            fileStore:
              pvc:
                size: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: puchi-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
