apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: puchi-api-routes
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: puchi-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /core
      backendRefs:
        - name: core-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /content
      backendRefs:
        - name: content-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /game
      backendRefs:
        - name: game-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /grading
      backendRefs:
        - name: grading-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /media
      backendRefs:
        - name: media-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /notification
      backendRefs:
        - name: notification-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /user
      backendRefs:
        - name: user-service
          namespace: puchi-backend
          port: 8000
