apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-cluster
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: 'https://github.com/puchidemy/puchi-infra'
    targetRevision: main
    path: infra/postgres-cluster
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: puchi-db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  dependsOn:
    - cnpg-operator
