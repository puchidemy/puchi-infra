apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: puchi-routes
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: puchi-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/core
      backendRefs:
        - name: core-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /v1/content
      backendRefs:
        - name: content-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /v1/game
      backendRefs:
        - name: game-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /v1/grading
      backendRefs:
        - name: grading-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /v1/media
      backendRefs:
        - name: media-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /v1/notification
      backendRefs:
        - name: notification-service
          namespace: puchi-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /v1/user
      backendRefs:
        - name: user-service
          namespace: puchi-backend
          port: 8000
