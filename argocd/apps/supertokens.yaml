apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supertokens
  namespace: argocd
spec:
  project: puchi
  source:
    chart: supertokens
    repoURL: 'https://helm.supertokens.io'
    targetRevision: 0.7.x
    helm:
      values: |
        image:
          tag: 9.3.0
        replicaCount: 1
        config:
          apiKeys:
            - change-in-production-please
        service:
          type: NodePort
          ports:
            - port: 3567
              targetPort: 3567
              nodePort: 30567
        ingress:
          enabled: true
          className: traefik
          hosts:
            - host: auth.puchi.io.vn
              paths:
                - path: /
                  pathType: Prefix
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: puchi-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
