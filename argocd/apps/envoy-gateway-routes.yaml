apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-routes
  namespace: argocd
spec:
  project: puchi
  source:
    repoURL: 'https://github.com/puchidemy/puchi-infra'
    targetRevision: main
    path: infra/envoy-gateway
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
