apiVersion: apps/v1
kind: Deployment
metadata:
  name: game
  namespace: puchi-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game
  template:
    metadata:
      labels:
        app: game
    spec:
      containers:
        - name: game
          image: ghcr.io/puchidemy/puchi-game:latest
          ports:
            - containerPort: 8000
            - containerPort: 9000
          command: ["./game", "-conf", "/data/conf"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: puchi-backend
spec:
  selector:
    app: game
  ports:
    - name: grpc
      port: 8000
      targetPort: 8000
    - name: debug
      port: 9000
      targetPort: 9000
