# Cluster-managed OAuth credentials for auth-service (NOT synced by ArgoCD).
#
# Secret name: auth-oauth-credentials (namespace puchi-backend)
# Keys: GOOGLE_*, FACEBOOK_*, TIKTOK_CLIENT_KEY, TIKTOK_CLIENT_SECRET
#
# Create / rotate (copy from frontend oauth-credentials):
#   ... GOOGLE / FACEBOOK as before ...
#   T_KEY=$(kubectl get secret oauth-credentials -n puchi-frontend -o jsonpath='{.data.TIKTOK_CLIENT_KEY}' | base64 -d)
#   T_SEC=$(kubectl get secret oauth-credentials -n puchi-frontend -o jsonpath='{.data.TIKTOK_CLIENT_SECRET}' | base64 -d)
#   kubectl create secret generic auth-oauth-credentials -n puchi-backend \
#     --from-literal=GOOGLE_CLIENT_ID=... \
#     --from-literal=TIKTOK_CLIENT_KEY="$T_KEY" \
#     --from-literal=TIKTOK_CLIENT_SECRET="$T_SEC" \
#     ...
# Redirect URI to register in TikTok Developer Portal:
#   https://api.puchi.io.vn/auth/oauth/tiktok/callback
#
# LIMEN_SECRET (32 bytes) lives in auth-limen-secret — also cluster-managed.
