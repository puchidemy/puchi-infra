apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: puchi-backend
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
    limen:
      base_url: "https://api.puchi.io.vn"
      secret: "" # set via LIMEN_SECRET env
      trusted_origins:
        - "https://puchi.io.vn"
        - "http://localhost:3000"
      cookie_domain: "puchi.io.vn"
      frontend_url: "https://puchi.io.vn"
    data:
      database:
        source: "postgres://puchi:puchi-db-prod@pg-puchi-rw.puchi-db.svc.cluster.local:5432/puchi?sslmode=disable&search_path=auth"
      nats:
        url: "nats://nats.platform.svc.cluster.local:4222"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: puchi-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ghcr.io/puchidemy/puchi-auth:git-41e0405
          envFrom:
            - secretRef:
                name: auth-oauth-credentials
          env:
            - name: LIMEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-limen-secret
                  key: LIMEN_SECRET
            - name: LIMEN_BASE_URL
              value: "https://api.puchi.io.vn"
            - name: FRONTEND_URL
              value: "https://puchi.io.vn"
          ports:
            - containerPort: 8000
          command:
            - ./auth
            - -conf
            - /data/conf
          volumeMounts:
            - name: config
              mountPath: /data/conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: auth-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: puchi-backend
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 8000
      targetPort: 8000
