apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: puchi-auth-routes
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: puchi-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: core-service
          namespace: puchi-backend
          port: 8000
