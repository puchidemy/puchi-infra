apiVersion: v1
kind: ConfigMap
metadata:
  name: learn-config
  namespace: puchi-backend
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 1s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 1s
    data:
      database:
        driver: postgres
        source: postgres://puchi:puchi-db-prod@pg-puchi-rw.puchi-db.svc.cluster.local:5432/puchi?sslmode=disable
      redis:
        addr: valkey-node-0.platform.svc.cluster.local:6379
        read_timeout: 0.2s
        write_timeout: 0.2s
      nats:
        url: "nats://nats.platform.svc.cluster.local:4222"
    auth:
      auth_service_url: "http://auth-service.puchi-backend:8000"
      public_paths:
        - /v1/health
        - /v1/healthz
        - /v1/learn/guest/session
    learn:
      trial_unit_id: "11111111-1111-1111-1111-111111111111"
      guest_cookie_name: "puchi_guest_id"
      guest_ttl_days: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: learn
  namespace: puchi-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learn
  template:
    metadata:
      labels:
        app: learn
    spec:
      containers:
        - name: learn
          image: ghcr.io/puchidemy/puchi-learn:git-8a54aad
          ports:
            - containerPort: 8000
            - containerPort: 9000
          command: ["./learn", "-conf", "/data/conf"]
          volumeMounts:
            - name: config
              mountPath: /data/conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: learn-config
---
apiVersion: v1
kind: Service
metadata:
  name: learn-service
  namespace: puchi-backend
spec:
  selector:
    app: learn
  ports:
    - name: grpc
      port: 8000
      targetPort: 8000
    - name: debug
      port: 9000
      targetPort: 9000
